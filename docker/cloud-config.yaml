#cloud config
hostname: "coreos"

coreos:
        units:
                - name: 00-static.network
                  contents: |
                          [Match]
                          Name=eth0

                          [Network]
                          DNS=192.168.0.254
                          Address=192.168.0.101/24
                          Gateway=192.168.0.254
passwd:
        users:
                - name: core
                  password_hash: $1$2pbo.tP/$vUFpFKHavJglafnXW1Iyt0
                  groups:
                          - sudo
                          - docker
